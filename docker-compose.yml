services:
  homelab-automation-center:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homelab-automation-center
    ports:
      - "8099:8080"
    environment:
      HAC_CONFIG_PATH: ${HAC_CONFIG_PATH:-/config/jobs.yml}
      HAC_STATUS_ROOT: ${HAC_STATUS_ROOT:-/status}
    volumes:
      - /mnt/user/appdata/homelab-automation-center/config:/config
      - /mnt/user/appdata/homelab-automation-center/status:/status
    restart: unless-stopped
    networks:
      - app_network

networks:
  app_network:
    external: true
    name: ${HOMELAB_AUTOMATION_CENTER_DOCKER_NETWORK:-media_network}
