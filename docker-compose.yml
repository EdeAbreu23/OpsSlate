services:
  opsslate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opsslate
    ports:
      - "8099:8080"
    environment:
      HAC_CONFIG_PATH: ${HAC_CONFIG_PATH:-/config/jobs.yml}
      HAC_STATUS_ROOT: ${HAC_STATUS_ROOT:-/status}
    volumes:
      - /mnt/user/appdata/opsslate/config:/config
      - /mnt/user/appdata/opsslate/status:/status
    restart: unless-stopped
    networks:
      - app_network

networks:
  app_network:
    external: true
    name: ${OPSSLATE_DOCKER_NETWORK:-${HOMELAB_AUTOMATION_CENTER_DOCKER_NETWORK:-media_network}}
