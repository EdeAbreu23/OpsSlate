services:
  homelab-automation-center:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homelab-automation-center
    ports:
      - "8099:8080"
    volumes:
      - /mnt/user/appdata/homelab-automation-center/config:/config
      - /mnt/user/appdata/homelab-automation-center/status:/status
    restart: unless-stopped
