services:
  opsslate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opsslate
    ports:
      - "8099:8080"
    environment:
      HAC_CONFIG_PATH: ${HAC_CONFIG_PATH:-/config/jobs.yml}
      HAC_STATUS_ROOT: ${HAC_STATUS_ROOT:-/status}
    labels:
      net.unraid.docker.icon: "${OPSSLATE_ICON_URL:-https://raw.githubusercontent.com/EdeAbreu23/unraid-templates/main/images/opsslate-icon.png}"
      net.unraid.docker.webui: "${OPSSLATE_WEBUI_URL:-http://localhost:8099}"
    volumes:
      - /mnt/user/appdata/opsslate/config:/config
      - /mnt/user/appdata/opsslate/status:/status
    restart: unless-stopped
    networks:
      - app_network

networks:
  app_network:
    external: true
    name: ${OPSSLATE_DOCKER_NETWORK:-${HOMELAB_AUTOMATION_CENTER_DOCKER_NETWORK:-media_network}}
