name: Docker CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  docker-ci:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t opsslate:ci .
