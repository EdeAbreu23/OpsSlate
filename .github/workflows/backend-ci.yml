name: Backend CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend-ci:
    name: Restore, build, and test backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/HomelabAutomationCenter/HomelabAutomationCenter.csproj

      - name: Build
        run: dotnet build src/HomelabAutomationCenter/HomelabAutomationCenter.csproj --configuration Release --no-restore

      - name: Test if test projects exist
        shell: bash
        run: |
          test_project=$(find . -type f \( -name '*Test.csproj' -o -name '*Tests.csproj' \) -print -quit)

          if [ -n "$test_project" ]; then
            dotnet test --configuration Release --no-build
          else
            echo "No test projects found; skipping dotnet test."
          fi
