name: Backend CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend-ci:
    name: Restore, build, and test backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/OpsSlate/OpsSlate.csproj

      - name: Build
        run: dotnet build src/OpsSlate/OpsSlate.csproj --configuration Release --no-restore

      - name: Test if test projects exist
        shell: bash
        run: |
          mapfile -t test_projects < <(find . -type f \( -name '*Test.csproj' -o -name '*Tests.csproj' \) -print)

          if [ "${#test_projects[@]}" -eq 0 ]; then
            echo "No test projects found; skipping dotnet test."
            exit 0
          fi

          for test_project in "${test_projects[@]}"; do
            echo "Running tests for ${test_project}"
            dotnet test "${test_project}" --configuration Release
          done
