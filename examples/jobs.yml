jobs:
  - id: health_check
    name: Health Check
    status_path: health_check/status.json
    stale_after_minutes: 60
  - id: backup_nas
    name: NAS Backup
    status_path: backup_nas/status.json
    stale_after_minutes: 180
    depends_on:
      - health_check
